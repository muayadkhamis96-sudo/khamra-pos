<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo diagnostic 3</title>
<style>
  body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; padding: 14px; background: #f4ead9; color: #3a2415; }
  .ua { font-size: 11px; word-break: break-all; background: #fff; padding: 8px; border: 1px solid #ccc; border-radius: 8px; }
  .status { font-weight: bold; margin: 10px 0; font-size: 14px; }
  h2 { font-size: 14px; margin: 18px 0 6px; }

  .boxA { width: 220px; height: 150px; border: 2px solid #5a3114; background: #fff; overflow: hidden; }
  .boxA img { width: 100%; height: auto; display: block; }

  /* G — DIV card (worked for you) */
  .gridX { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
  .cardDiv { display: flex; flex-direction: column; border: 2px solid #2e7d32; overflow: hidden; background: #fff; }
  .thumb { height: 150px; flex: none; position: relative; overflow: hidden; display: grid; place-items: center; background: #fff; }
  .thumb .ph { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  .lbl { padding: 8px; font-size: 13px; }

  /* J — BUTTON card, exactly like the real app (suspect) */
  .cardBtn { display: flex; flex-direction: column; border: 2px solid #b4503f; overflow: hidden; background: #fff; padding: 0; color: inherit; font: inherit; text-align: start; cursor: pointer; }

  /* K — BUTTON card WITH appearance reset (candidate fix) */
  .cardBtnFix { display: flex; flex-direction: column; border: 2px solid #1565c0; overflow: hidden; background: #fff; padding: 0; color: inherit; font: inherit; text-align: start; cursor: pointer; -webkit-appearance: none; appearance: none; }
</style>
</head>
<body>
  <div class="ua" id="ua"></div>
  <div class="status" id="status">Loading…</div>

  <h2>A — does the photo load?</h2>
  <div class="boxA"><img id="imgA" alt=""></div>

  <h2>G — GREEN: DIV card (this showed the cup last time)</h2>
  <div class="gridX"><div class="cardDiv"><div class="thumb"><img class="ph" id="imgG" alt=""></div><div class="lbl">div</div></div></div>

  <h2>J — RED: BUTTON card (same element as the real app)</h2>
  <div class="gridX"><button class="cardBtn"><div class="thumb"><img class="ph" id="imgJ" alt=""></div><div class="lbl">button</div></button></div>

  <h2>K — BLUE: BUTTON card + appearance reset (candidate fix)</h2>
  <div class="gridX"><button class="cardBtnFix"><div class="thumb"><img class="ph" id="imgK" alt=""></div><div class="lbl">button + fix</div></button></div>

  <script>
    document.getElementById('ua').textContent = navigator.userAgent;
    var src = 'assets/products/karak.jpg?nocache=' + (new Date().getTime());
    ['imgA','imgG','imgJ','imgK'].forEach(function (id) {
      var im = document.getElementById(id);
      im.onload = function () { if (id === 'imgA') document.getElementById('status').textContent = 'Image loaded OK — ' + im.naturalWidth + 'x' + im.naturalHeight; };
      im.onerror = function () { document.getElementById('status').textContent = 'IMAGE FAILED TO LOAD'; };
      im.src = src;
    });
  </script>
</body>
</html>
